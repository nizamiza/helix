[language-server.efm]
command = "efm-langserver"

[[language]]
name = "typescript"
auto-format = true
language-servers = [
  { name = "efm", only-features = [ "diagnostics", "format" ] },
  { name = "typescript-language-server", except-features = [ "format" ] },
]

[[language]]
name = "javascript"
auto-format = true
language-servers = [
  { name = "efm", only-features = [ "diagnostics", "format" ] },
  { name = "typescript-language-server", except-features = [ "format" ] },
]

